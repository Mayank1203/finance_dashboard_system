spring:
  application:
    name: finance_dashboard_system

server:
  port: 8080

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F}
  expiration-ms: ${JWT_EXPIRY_MS:86400000}   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info

